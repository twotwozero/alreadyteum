<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>예약 현황</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #111318;
    --surface: #1e2128;
    --surface2: #282d37;
    --border: #2e3340;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --color-full: #a78b3e;
    --color-a: #3b7fc4;
    --color-b: #2d9e6b;
    --color-c: #c43b6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(17,19,24,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 10px;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; }
  .logo span { color: var(--color-full); }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .btn-sm {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .btn-sm:active { transform: scale(0.95); }
  .spinning .icon { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-label { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; min-width: 130px; text-align: center; }
  .nav-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .nav-btn:active { transform: scale(0.92); }

  .legend {
    display: flex; gap: 12px; padding: 8px 16px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  .status-bar {
    padding: 5px 16px; font-size: 11px; color: var(--text-muted);
    font-family: 'DM Mono', monospace; text-align: center;
    border-bottom: 1px solid var(--border); min-height: 24px;
  }

  .config-section { padding: 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .config-label { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .config-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 12px; font-family: 'DM Mono', monospace; outline: none;
    transition: border-color 0.2s; margin-bottom: 10px;
  }
  .config-input:focus { border-color: var(--color-a); }
  .save-btn {
    width: 100%; background: var(--color-full); color: #0f0f0f; border: none;
    border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s;
  }
  .save-btn:active { transform: scale(0.98); }

  /* ── 달력 ── */
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
  .weekday { text-align: center; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 7px 0; }
  .weekday:first-child { color: #e86b6b; }
  .weekday:last-child  { color: var(--color-a); }

  .week-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
    position: relative; min-height: 96px;
  }

  .day-cell {
    border-right: 1px solid var(--border);
    padding: 5px 4px 4px; min-height: 96px;
  }
  .day-cell:last-child { border-right: none; }

  .day-num {
    font-size: 12px; font-weight: 500;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; margin-bottom: 2px;
  }
  .day-cell.today .day-num { background: var(--color-a); color: #fff; font-weight: 700; }
  .day-cell.other-month .day-num { color: #3a3f4d; }
  .day-cell.sunday .day-num  { color: #e86b6b; }
  .day-cell.saturday .day-num { color: var(--color-a); }
  .day-cell.today.sunday .day-num,
  .day-cell.today.saturday .day-num { color: #fff; }

  /* 바 레이어 */
  .bars-layer {
    position: absolute;
    top: 30px; left: 0; right: 0;
    pointer-events: none;
  }

  .bar-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    height: 20px; margin-bottom: 2px;
  }

  .bar-seg {
    height: 18px;
    display: flex; align-items: center;
    overflow: hidden;
    pointer-events: all;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .bar-seg:hover { filter: brightness(1.2); }
  .bar-seg.empty { background: transparent !important; pointer-events: none; cursor: default; }
  .bar-seg.is-start { border-radius: 9px 0 0 9px; padding-left: 7px; }
  .bar-seg.is-end   { border-radius: 0 9px 9px 0; }
  .bar-seg.is-start.is-end { border-radius: 9px; padding-left: 7px; }
  .bar-seg.is-middle { border-radius: 0; }

  .bar-label { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; line-height: 1; }

  .bar-full { background: var(--color-full); }
  .bar-a    { background: var(--color-a); }
  .bar-b    { background: var(--color-b); }
  .bar-c    { background: var(--color-c); }

  /* ── 패널 ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.show { opacity: 1; pointer-events: all; }

  .detail-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 16px 20px 36px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200; max-height: 65vh; overflow-y: auto;
  }
  .detail-panel.open { transform: translateY(0); }
  .panel-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .panel-date { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .panel-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .panel-row:last-child { border-bottom: none; }
  .panel-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .panel-room { font-size: 13px; font-weight: 600; flex: 1; }
  .panel-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .panel-status { font-size: 12px; font-family: 'DM Mono', monospace; }
  .panel-channel { font-size: 10px; color: var(--text-muted); }

  /* ── 로딩 ── */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; gap: 16px; transition: opacity 0.4s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loader { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--color-full); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text">예약 현황 불러오는 중...</div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="header">
  <div class="header-top">
    <div class="logo"><span>●</span> 예약 현황</div>
    <div class="header-right">
      <button class="btn-sm" onclick="goToday()">오늘</button>
      <button class="btn-sm" id="refreshBtn" onclick="loadData()">
        <span class="icon">↻</span> 새로고침
      </button>
    </div>
  </div>
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-full)"></div>독채</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-a)"></div>ROOM A</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-b)"></div>ROOM B</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--color-c)"></div>ROOM C</div>
</div>

<div class="status-bar" id="statusBar">URL을 설정해주세요</div>

<div id="configSection" class="config-section">
  <div class="config-label">에어비앤비 CSV URL</div>
  <input class="config-input" id="airbnbUrl" placeholder="https://docs.google.com/spreadsheets/..." />
  <div class="config-label">네이버 CSV URL</div>
  <input class="config-input" id="naverUrl" placeholder="https://docs.google.com/spreadsheets/..." />
  <button class="save-btn" onclick="saveConfig()">저장 후 불러오기</button>
</div>

<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
    <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
  </div>
  <div id="calendarGrid"></div>
</div>

<div class="detail-panel" id="detailPanel">
  <div class="panel-handle"></div>
  <div class="panel-date" id="panelDate"></div>
  <div id="panelContent"></div>
</div>

<script>
const ROOMS = {
  full: { label: '독채',   color: '#a78b3e', cls: 'bar-full' },
  a:    { label: 'ROOM A', color: '#3b7fc4', cls: 'bar-a' },
  b:    { label: 'ROOM B', color: '#2d9e6b', cls: 'bar-b' },
  c:    { label: 'ROOM C', color: '#c43b6e', cls: 'bar-c' },
};
const ROOM_ORDER = ['full', 'a', 'b', 'c'];

let currentDate = new Date();
// bookings: Map<"YYYY-MM-DD", Map<room, Set<source>>>
let bookings = new Map();
let airbnbUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3aqqbRHO6FUAQXRoY_jCT2hrH8IdXmyEaDyWkWaZIvRcCyJzB5DzTwR4iNdJwki081UsFYqswxN-/pub?gid=0&single=true&output=csv';
let naverUrl  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTY3aqqbRHO6FUAQXRoY_jCT2hrH8IdXmyEaDyWkWaZIvRcCyJzB5DzTwR4iNdJwki081UsFYqswxN-/pub?gid=1100701846&single=true&output=csv';

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('configSection').style.display = 'none';
  loadData();
});

function saveConfig() {
  const a = document.getElementById('airbnbUrl').value.trim();
  const n = document.getElementById('naverUrl').value.trim();
  if (!a || !n) { alert('두 URL을 모두 입력해주세요.'); return; }
  airbnbUrl = a; naverUrl = n;
  localStorage.setItem('airbnbUrl', a);
  localStorage.setItem('naverUrl', n);
  document.getElementById('configSection').style.display = 'none';
  loadData();
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('불러오는 중...');
  bookings = new Map();

  try {
    const ts = Date.now();
    const sep = (url) => url.includes('?') ? '&' : '?';
    const [r1, r2] = await Promise.all([
      fetch(airbnbUrl + sep(airbnbUrl) + '_=' + ts),
      fetch(naverUrl  + sep(naverUrl)  + '_=' + ts),
    ]);
    if (!r1.ok) throw new Error('에어비앤비 CSV 오류');
    if (!r2.ok) throw new Error('네이버 CSV 오류');
    parseCSV(await r1.text());
    parseCSV(await r2.text());
    setStatus('마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'}));
  } catch(e) {
    setStatus('⚠ 불러오기 실패 — URL을 확인해주세요');
    console.error(e);
  }

  btn.classList.remove('spinning');
  document.getElementById('loadingOverlay').classList.add('hidden');
  renderCalendar();
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
    const date   = cols[0];
    const room   = cols[1]?.toLowerCase();
    const source = cols[2]?.toLowerCase() || '';
    if (!date || !room) continue;
    if (!bookings.has(date)) bookings.set(date, new Map());
    if (!bookings.get(date).has(room)) bookings.get(date).set(room, new Set());
    bookings.get(date).get(room).add(source);
  }
}

function renderCalendar() {
  const year  = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('monthLabel').textContent = year + '년 ' + (month + 1) + '월';

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const today    = new Date();
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDay; i++) {
    cells.push({ date: new Date(year, month, 1 - (firstDay - i)), thisMonth: false });
  }
  for (let d = 1; d <= lastDate; d++) {
    cells.push({ date: new Date(year, month, d), thisMonth: true });
  }
  while (cells.length % 7 !== 0) {
    const last = cells[cells.length - 1].date;
    const next = new Date(last); next.setDate(last.getDate() + 1);
    cells.push({ date: next, thisMonth: false });
  }

  for (let w = 0; w < cells.length / 7; w++) {
    const week   = cells.slice(w * 7, w * 7 + 7);
    const weekEl = document.createElement('div');
    weekEl.className = 'week-row';

    // 날짜 셀
    week.forEach(cell => {
      const cellEl = document.createElement('div');
      const dow    = cell.date.getDay();
      const isTdy  = sameDay(cell.date, today);
      cellEl.className = 'day-cell' +
        (!cell.thisMonth ? ' other-month' : '') +
        (isTdy    ? ' today'    : '') +
        (dow === 0 ? ' sunday'  : '') +
        (dow === 6 ? ' saturday': '');
      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = cell.date.getDate();
      cellEl.appendChild(numEl);
      weekEl.appendChild(cellEl);
    });

    // 바 레이어
    const barsLayer = document.createElement('div');
    barsLayer.className = 'bars-layer';

    // 이 주에 예약 있는 룸만 위에서부터 채움
    const activeRooms = ROOM_ORDER.filter(room =>
      week.some(cell => bookings.get(fmt(cell.date))?.has(room))
    );
    const rows = [...activeRooms];
    while (rows.length < 4) rows.push(null);

    rows.forEach(room => {
      const barRow = document.createElement('div');
      barRow.className = 'bar-row';

      week.forEach((cell, colIdx) => {
        const ds  = fmt(cell.date);
        const seg = document.createElement('div');
        seg.className = 'bar-seg';

        if (room && bookings.get(ds)?.has(room)) {
          const prev = fmt(dayOffset(cell.date, -1));
          const next = fmt(dayOffset(cell.date, +1));
          const prevB = bookings.get(prev)?.has(room);
          const nextB = bookings.get(next)?.has(room);
          const isStart = !prevB || colIdx === 0;
          const isEnd   = !nextB || colIdx === 6;

          seg.classList.add(ROOMS[room].cls);
          if (isStart && isEnd) seg.classList.add('is-start', 'is-end');
          else if (isStart)     seg.classList.add('is-start');
          else if (isEnd)       seg.classList.add('is-end');
          else                  seg.classList.add('is-middle');

          if (isStart) {
            const lbl = document.createElement('span');
            lbl.className = 'bar-label';
            lbl.textContent = ROOMS[room].label;
            seg.appendChild(lbl);
          }
          seg.addEventListener('click', () => showDetail(ds, cell.date));
        } else {
          seg.classList.add('empty');
        }
        barRow.appendChild(seg);
      });

      barsLayer.appendChild(barRow);
    });

    weekEl.appendChild(barsLayer);
    grid.appendChild(weekEl);
  }
}

function showDetail(dateStr, dateObj) {
  const dayBookings = bookings.get(dateStr) || new Map();
  const m = dateObj.getMonth() + 1;
  const d = dateObj.getDate();
  const y = dateObj.getFullYear();

  document.getElementById('panelDate').textContent = `${y}년 ${m}월 ${d}일`;

  const content = document.getElementById('panelContent');
  content.innerHTML = '';

  ROOM_ORDER.forEach(room => {
    const row = document.createElement('div');
    row.className = 'panel-row';

    const dot = document.createElement('div');
    dot.className = 'panel-dot';
    dot.style.background = ROOMS[room].color;

    const name = document.createElement('div');
    name.className = 'panel-room';
    name.textContent = ROOMS[room].label;

    const right = document.createElement('div');
    right.className = 'panel-right';

    const status = document.createElement('div');
    status.className = 'panel-status';

    if (dayBookings.has(room)) {
      status.textContent = '예약됨';
      status.style.color = ROOMS[room].color;
      const srcs = dayBookings.get(room);
      const ch = document.createElement('div');
      ch.className = 'panel-channel';
      const lbls = [];
      if (srcs.has('airbnb')) lbls.push('에어비앤비');
      if (srcs.has('naver'))  lbls.push('네이버');
      ch.textContent = lbls.join(' · ');
      right.appendChild(status);
      right.appendChild(ch);
    } else {
      status.textContent = '예약가능';
      status.style.color = 'var(--text-muted)';
      right.appendChild(status);
    }

    row.appendChild(dot);
    row.appendChild(name);
    row.appendChild(right);
    content.appendChild(row);
  });

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function fmt(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function dayOffset(d, n) {
  const r = new Date(d); r.setDate(d.getDate() + n); return r;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}
function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  renderCalendar();
}
function goToday() {
  currentDate = new Date();
  renderCalendar();
}
function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}
</script>
</body>
</html>
